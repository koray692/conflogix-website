<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conflogix CLC</title>
    <meta name="description" content="Conflogix CLC is a compact logic controller for visual automation flows.">
    <script>
      var saved = document.cookie.match(/(?:^|;\s*)clc_lang=(tr|en)(?:;|$)/);
      var target = saved ? saved[1] : ((navigator.language || "").toLowerCase().startsWith("tr") ? "tr" : "en");
      window.location.replace("/" + target + "/");
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/en/">English</a> / <a href="/tr/">Turkish</a>.</p>
  </body>
</html>
